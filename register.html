<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sproutly — Register</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fraunces:wght@700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Dots -->
  <div class="dot" style="width:9px;height:9px;background:#99ff99;top:12%;left:22%;"></div>
  <div class="dot" style="width:6px;height:6px;background:#76ead0;bottom:24%;left:9%;"></div>
  <div class="dot" style="width:10px;height:10px;background:#d0ff99;top:28%;right:19%;"></div>
  <div class="dot" style="width:7px;height:7px;background:#ffff9f;bottom:18%;right:12%;"></div>
  <div class="dot" style="width:5px;height:5px;background:#76d7ea;top:60%;left:6%;"></div>

  <!-- CARD -->
  <div class="card">

    <!-- Logo -->
    <div class="logo-wrap">
      <div class="logo-icon">🌱</div>
      <div>
        <div class="logo-name">Sproutly</div>
        <div class="logo-sub">by AVI</div>
      </div>
    </div>

    <div class="page-icon">🌿</div>
    <h1>Create Account</h1>
    <p class="description">Join our community of plant lovers and farming enthusiasts!</p>

    <!-- Form -->
    <div class="form">

      <!-- Row: Full Name + Phone -->
      <div class="row-2">
        <div class="field-wrap">
          <label for="fullname">Full Name</label>
          <div class="input-wrap">
            <span class="input-icon">👤</span>
            <input type="text" id="fullname" placeholder="Your full name" />
          </div>
        </div>
        <div class="field-wrap">
          <label for="phone">Phone Number</label>
          <div class="input-wrap">
            <span class="input-icon">📱</span>
            <input type="tel" id="phone" placeholder="+62 812 3456 7890" />
          </div>
        </div>
      </div>

      <!-- Row: Date of Birth + Gender -->
      <div class="row-2">
        <div class="field-wrap">
          <label for="dob">Date of Birth</label>
          <div class="input-wrap">
            <span class="input-icon">🎂</span>
            <input type="date" id="dob" />
          </div>
        </div>
        <div class="field-wrap">
          <label>Gender</label>
          <div class="gender-wrap">
            <label class="gender-option" id="label-male">
              <input type="radio" name="gender" value="male" onchange="updateGender()" />
              <span class="gender-icon">👨</span>
              <span>Male</span>
            </label>
            <label class="gender-option" id="label-female">
              <input type="radio" name="gender" value="female" onchange="updateGender()" />
              <span class="gender-icon">👩</span>
              <span>Female</span>
            </label>
          </div>
        </div>
      </div>

      <!-- Email -->
      <div class="field-wrap">
        <label for="email">Email Address</label>
        <div class="input-wrap">
          <span class="input-icon">✉️</span>
          <input type="email" id="email" placeholder="you@example.com" />
        </div>
      </div>

      <!-- Password -->
      <div class="field-wrap">
        <label for="password">Password</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input type="password" id="password" placeholder="Create a strong password" />
          <button class="eye-btn" onclick="togglePass('password', 'eye1')" id="eye1">👁️</button>
        </div>
      </div>

      <!-- Confirm Password -->
      <div class="field-wrap">
        <label for="confirm-password">Confirm Password</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input type="password" id="confirm-password" placeholder="Repeat your password" />
          <button class="eye-btn" onclick="togglePass('confirm-password', 'eye2')" id="eye2">👁️</button>
        </div>
      </div>

      <!-- Register Button -->
      <button class="register-btn" onclick="handleRegister()">
        <span id="btn-label">Create Account</span>
        <span class="btn-arrow">🌱</span>
      </button>

    </div>

    <!-- Login link -->
    <p class="login-text">
      Already have an account?
      <a href="login.html" class="login-link">Login here</a>
    </p>

  </div>

  <footer class="sr-only">
    <p>&copy; Sproutly by AVI</p>
  </footer>
  <script>
    
    function togglePass(inputId, btnId) {
      const input = document.getElementById(inputId);
      const btn   = document.getElementById(btnId);
      const show  = input.type === 'password';
      input.type  = show ? 'text' : 'password';
      btn.textContent = show ? '🙈' : '👁️';
    }

    function updateGender() {
      document.querySelectorAll('.gender-option').forEach(el => el.classList.remove('active'));
      const checked = document.querySelector('input[name="gender"]:checked');
      if (checked) checked.closest('.gender-option').classList.add('active');
    }

    function handleRegister() {
      const name    = document.getElementById('fullname').value.trim();
      const phone   = document.getElementById('phone').value.trim();
      const dob     = document.getElementById('dob').value;
      const email   = document.getElementById('email').value.trim();
      const pass    = document.getElementById('password').value;
      const confirm = document.getElementById('confirm-password').value;
      const gender  = document.querySelector('input[name="gender"]:checked');

      if (!name || !phone || !dob || !email || !pass || !confirm || !gender) {
        alert('Please fill in all fields 🌿'); return;
      }
      if (pass !== confirm) {
        alert('Passwords do not match 🌱'); return;
      }

      const btn = document.querySelector('.register-btn');
      document.getElementById('btn-label').textContent = 'Creating account...';
      btn.style.opacity = '0.75';
      btn.style.cursor  = 'not-allowed';

      setTimeout(() => {
        document.getElementById('btn-label').textContent = 'Welcome to Sproutly! 🎉';
        btn.style.opacity = '1';
      }, 1400);
    }
  </script>
</body>
</html>
