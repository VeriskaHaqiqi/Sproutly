<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sproutly — Forgot Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fraunces:wght@700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Blobs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="blob blob-4"></div>

  <!-- Botanical Leaf Decorations -->
  <svg class="deco-leaf leaf-top-left" viewBox="0 0 80 100" fill="none">
    <path d="M40 95C40 95 5 70 5 35C5 15 20 5 40 5C60 5 75 15 75 35C75 70 40 95 40 95Z" fill="#2d7a50" opacity="0.13"/>
    <path d="M40 95L40 5" stroke="#2d7a50" stroke-width="1.5" opacity="0.20" stroke-linecap="round"/>
    <path d="M40 65C28 55 16 46 10 35" stroke="#2d7a50" stroke-width="1" opacity="0.16" stroke-linecap="round"/>
    <path d="M40 48C52 40 63 31 68 22" stroke="#2d7a50" stroke-width="1" opacity="0.16" stroke-linecap="round"/>
  </svg>
  <svg class="deco-leaf leaf-top-left-2" viewBox="0 0 80 100" fill="none">
    <path d="M40 95C40 95 5 70 5 35C5 15 20 5 40 5C60 5 75 15 75 35C75 70 40 95 40 95Z" fill="#1a4a2e" opacity="0.09"/>
    <path d="M40 95L40 5" stroke="#1a4a2e" stroke-width="1.5" opacity="0.13" stroke-linecap="round"/>
  </svg>
  <svg class="deco-leaf leaf-bottom-right" viewBox="0 0 80 100" fill="none">
    <path d="M40 95C40 95 5 70 5 35C5 15 20 5 40 5C60 5 75 15 75 35C75 70 40 95 40 95Z" fill="#2d7a50" opacity="0.13"/>
    <path d="M40 95L40 5" stroke="#2d7a50" stroke-width="1.5" opacity="0.20" stroke-linecap="round"/>
    <path d="M40 65C28 55 16 46 10 35" stroke="#2d7a50" stroke-width="1" opacity="0.16" stroke-linecap="round"/>
    <path d="M40 48C52 40 63 31 68 22" stroke="#2d7a50" stroke-width="1" opacity="0.16" stroke-linecap="round"/>
  </svg>
  <svg class="deco-leaf leaf-bottom-right-2" viewBox="0 0 80 100" fill="none">
    <path d="M40 95C40 95 5 70 5 35C5 15 20 5 40 5C60 5 75 15 75 35C75 70 40 95 40 95Z" fill="#1a4a2e" opacity="0.09"/>
    <path d="M40 95L40 5" stroke="#1a4a2e" stroke-width="1.5" opacity="0.13" stroke-linecap="round"/>
  </svg>
  <svg class="deco-leaf sprout-right" viewBox="0 0 60 80" fill="none">
    <path d="M30 75V32" stroke="#2d7a50" stroke-width="2" stroke-linecap="round" opacity="0.20"/>
    <path d="M30 52C30 52 10 44 10 27C10 14 20 9 30 11C40 9 50 14 50 27C50 44 30 52 30 52Z" fill="#2d7a50" opacity="0.11"/>
    <path d="M30 68C30 68 12 58 8 44C6 36 12 30 20 32" stroke="#2d7a50" stroke-width="1.2" stroke-linecap="round" opacity="0.16"/>
  </svg>
  <svg class="deco-leaf sprout-left" viewBox="0 0 60 80" fill="none">
    <path d="M30 75V32" stroke="#1a4a2e" stroke-width="2" stroke-linecap="round" opacity="0.18"/>
    <path d="M30 52C30 52 10 44 10 27C10 14 20 9 30 11C40 9 50 14 50 27C50 44 30 52 30 52Z" fill="#1a4a2e" opacity="0.09"/>
  </svg>

  <!-- Floating dots -->
  <div class="dot" style="width:9px;height:9px;background:#99ff99;top:14%;left:24%;"></div>
  <div class="dot" style="width:6px;height:6px;background:#76ead0;bottom:26%;left:10%;"></div>
  <div class="dot" style="width:11px;height:11px;background:#d0ff99;top:30%;right:20%;"></div>
  <div class="dot" style="width:7px;height:7px;background:#ffff9f;bottom:20%;right:13%;"></div>
  <div class="dot" style="width:5px;height:5px;background:#76d7ea;top:58%;left:6%;"></div>
  <div class="dot" style="width:8px;height:8px;background:#99ff99;top:72%;right:28%;"></div>

  <!-- CARD -->
  <div class="card">

    <div class="logo-wrap">
      <div class="logo-icon">🌱</div>
      <div>
        <div class="logo-name">Sproutly</div>
        <div class="logo-sub">by AVI</div>
      </div>
    </div>

    <div class="page-icon">🔑</div>
    <h1>Forgot Password?</h1>
    <p class="description">
      No worries! Enter your registered email below and we'll send you a reset link right away. 🌿
    </p>

    <div class="form">
      <div class="field-wrap">
        <label for="email">Email Address</label>
        <div class="input-wrap">
          <span class="input-icon">✉️</span>
          <input type="email" id="email" placeholder="you@example.com" />
        </div>
      </div>

      <button class="submit-btn" onclick="handleSubmit()">
        <span id="btn-label">Send Reset Link</span>
        <span class="btn-arrow">→</span>
      </button>
    </div>

    <div class="success-msg" id="success-msg">
      <span class="success-icon">✅</span>
      <div>
        <div class="success-title">Check your inbox!</div>
        <div class="success-sub">We've sent a reset link to your email address.</div>
      </div>
    </div>

    <a href="../login/index.html" class="back-link">
      <span class="back-arrow">←</span> Back to Login
    </a>

  </div>

  <script>
    let sent = false;

    function handleSubmit() {
      const email = document.getElementById('email').value.trim();
      if (!email) { alert('Please enter your email address 🌿'); return; }
      if (!email.includes('@')) { alert('Please enter a valid email address 🌱'); return; }
      if (sent) return;
      sent = true;

      const btn = document.querySelector('.submit-btn');
      btn.style.opacity = '0.7';
      btn.style.cursor = 'not-allowed';
      document.getElementById('btn-label').textContent = 'Sending...';

      setTimeout(() => {
        document.getElementById('success-msg').classList.add('show');
        document.getElementById('btn-label').textContent = 'Link Sent!';
        btn.style.background = 'linear-gradient(135deg, #99ff99, #76ead0)';
      }, 1200);
    }
  </script>
</body>
</html>
